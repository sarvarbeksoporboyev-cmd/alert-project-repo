services:
  alert-processor:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    volumes:
      - ./data.csv:/data/data.csv:ro
      - ./output:/app/output
    command:
      - python
      - -m
      - alert_project.cli
      - --input
      - /data/data.csv
      - --output
      - /app/output/alerts.jsonl
      - --chunksize
      - "200000"